[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = -v --tb=short --strict-markers
markers =
    unit: модульные тесты (одна функция)
    integration: интеграционные тесты (несколько модулей)
    slow: медленные тесты (>1 сек)
