version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ml-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: uvicorn api.main:app --host 0.0.0.0 --port 8001

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: rq worker --url redis://redis:6379/0

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - ml-api

volumes:
  redis_data: