version: "3.8"

services:
  # ==================== Общие ====================

  # Nginx — API Gateway + раздача фронтенда
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - ml-api
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # Redis — кэш и очередь RQ
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ==================== ML-модуль (твоя зона) ====================

  # FastAPI API
  ml-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
    volumes:
      - ml-models:/app/models
      - ml-logs:/app/logs
      - ml-experiments:/app/experiments

  # RQ Worker — фоновые задачи (обучение, SHAP)
  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - redis
      - ml-api
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ml-models:/app/models
      - ml-logs:/app/logs
      - ml-experiments:/app/experiments

# ==================== Volumes ====================
volumes:
  ml-models:        # Сохранённые модели (.pkl + .json)
  ml-logs:          # Логи, метрики, отчёты дрейфа
  ml-experiments:   # Сохранённые эксперименты
